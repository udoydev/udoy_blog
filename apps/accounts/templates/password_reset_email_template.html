<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Password Reset</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div
      class="container mt-4 p-4 border rounded"
      style="max-width: 600px; background-color: #f8f9fa"
    >
      <h3>Hello {{ user.full_name|default:user.username }},</h3>
      <p>
        You requested a password reset for your account. Click the button below
        to reset your password:
      </p>

      <div class="text-center my-4">
        <a
          href="{{ reset_link }}"
          class="btn btn-primary"
          style="padding: 10px 20px; font-size: 16px"
          >Reset Password</a
        >
      </div>

      <p>
        If you didn't request this, ignore this email. The link will expire
        soon.
      </p>
      <hr />
      <p class="text-muted">Thanks,<br />UdoyBlog Team</p>
    </div>
  </body>
</html>
